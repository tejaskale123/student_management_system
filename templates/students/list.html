{% extends 'base.html' %}

{% block content %}
<h2>Students</h2>

<form method="GET">
<input type="text" name="q" placeholder="Search name">
<button type="submit">Search</button>
</form>

<table border="1">
<tr>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Class</th>
<th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.email }}</td>
<td>{{ s.phone }}</td>
<td>{{ s.class_id }}</td>
<td>
    <a href="/students/edit/{{ s.id }}">Edit</a>
    <a href="/students/delete/{{ s.id }}">Delete</a>
    <a href="/attendance/report/{{ s.id }}">Report</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
