{% extends 'base.html' %}

{% block content %}
<div class="header-actions">
    <h2>📊 Dashboard Overview</h2>
    <div style="display: flex; gap: 0.75rem;">
        <a href="/students/add/" class="btn btn-sm">➕ Add Student</a>
        <a href="/attendance/add/" class="btn btn-sm btn-secondary">📝 Mark Attendance</a>
    </div>
</div>

<div class="dashboard-grid">
    <div class="card">
        <h3>👨‍🎓 Total Students</h3>
        <div class="stat">{{ total_students }}</div>
    </div>
    <div class="card">
        <h3>🏫 Total Classes</h3>
        <div class="stat">{{ total_classes }}</div>
    </div>
    <div class="card">
        <h3>📋 Total Attendance Records</h3>
        <div class="stat">{{ total_attendance }}</div>
    </div>
</div>
{% endblock %}
