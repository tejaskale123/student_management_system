{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-3">✅ Mark Daily Attendance</h2>

    <form method="POST">
        {% csrf_token %}
        {% if error %}
        <div style="color: #ef4444; background: #fee2e2; padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center; font-weight: 600;">
            {{ error }}
        </div>
        {% endif %}
        <div class="form-group">
            <label>👨‍🎓 Select Student</label>
            <select name="student_id" required>
                <option value="" disabled selected>-- Choose Student --</option>
                {% for s in students %}
                <option value="{{ s.pk }}">{{ s.name }} (Class {{ s.class_id }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>📅 Date</label>
            <input type="date" name="date" required>
        </div>
        <div class="form-group">
            <label>📋 Status</label>
            <select name="status" required>
                <option value="Present">✅ Present</option>
                <option value="Absent">❌ Absent</option>
            </select>
        </div>

        <button type="submit">📝 Submit Attendance</button>
    </form>
</div>
{% endblock %}
