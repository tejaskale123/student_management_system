{% extends 'base.html' %}

{% block content %}
<div class="header-actions">
    <h2>🏫 Manage Classes</h2>
    <a href="/classes/add/" class="btn">➕ Add New Class</a>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Class Name</th>
                <th>Academic Year</th>
                <th>Section</th>
            </tr>
        </thead>
        <tbody>
            {% for c in classes %}
            <tr>
                <td><strong>{{ c.class_name }}</strong></td>
                <td>{{ c.year }}</td>
                <td><span class="badge badge-section">{{ c.section }}</span></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted" style="padding: 2rem;">
                    📭 No classes added yet. <a href="/classes/add/">Create your first class</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
