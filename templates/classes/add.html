{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2 class="text-center mb-3">🏫 Create New Class</h2>

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>📚 Class Name</label>
            <input type="text" name="class_name" placeholder="e.g. 10th Grade, B.Sc Computer Science" required>
        </div>
        <div class="form-group">
            <label>📅 Academic Year</label>
            <input type="number" name="year" placeholder="e.g. 2026" required>
        </div>
        <div class="form-group">
            <label>🔤 Section</label>
            <input type="text" name="section" placeholder="e.g. A, B, C" required>
        </div>

        <button type="submit">💾 Save Class</button>
    </form>
</div>
{% endblock %}
